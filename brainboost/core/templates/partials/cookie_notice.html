<div id="cookie-notice" class="cookie-notice" role="dialog" aria-live="polite" aria-label="Hinweis zu technisch notwendigen Cookies">
    <div class="cookie-notice__content">
        <div class="cookie-notice__text">
            <div class="cookie-notice__title">Hinweis zu technisch notwendigen Cookies</div>
            <div class="cookie-notice__body">
                Wir verwenden ausschließlich technisch notwendige Cookies (z.&nbsp;B. CSRF-Schutz), um die Sicherheit und grundlegenden Funktionen der Webapp zu gewährleisten.
                Weitere Informationen: <a class="cookie-notice__link" href="{% url 'impressum' %}">Datenschutz</a>.
            </div>
        </div>
        <div class="cookie-notice__actions">
            <button type="button" id="cookie-notice-ack" class="cookie-notice__button">Verstanden</button>
        </div>
    </div>
</div>
