{% extends "base.html" %}
{% block title %}{{ heading }}{% endblock %}
{% block content %}
<div class="card">
    <h1>{{ heading }}</h1>
    <p class="muted">Maximal 10 MB. Erlaubt: pdf, png, jpg, jpeg, docx.</p>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="button" type="submit">Hochladen</button>
        <a class="button" style="background: var(--teal);" href="{% url 'dashboard' %}">Abbrechen</a>
    </form>
</div>
{% endblock %}

{% block scripts %}
{{ block.super }}
<script>
    (function () {
        var studentSelect = document.querySelector("[data-material-student-select]");
        var taskSelect = document.querySelector("[data-related-task-select]");

        if (!studentSelect || !taskSelect) {
            return;
        }

        function filterTasksForStudent() {
            var selectedStudentId = studentSelect.value;
            var selectedTaskStillAvailable = false;

            Array.prototype.forEach.call(taskSelect.options, function (option) {
                if (!option.value) {
                    option.hidden = false;
                    option.disabled = false;
                    return;
                }

                var matchesStudent = selectedStudentId && option.dataset.studentId === selectedStudentId;
                option.hidden = !matchesStudent;
                option.disabled = !matchesStudent;

                if (matchesStudent && option.selected) {
                    selectedTaskStillAvailable = true;
                }
            });

            if (!selectedTaskStillAvailable) {
                taskSelect.value = "";
            }
        }

        studentSelect.addEventListener("change", filterTasksForStudent);
        filterTasksForStudent();
    })();
</script>
{% endblock %}
