{% extends "base.html" %}
{% block title %}Passwort gesetzt{% endblock %}
{% block content %}
<div class="card">
    <h1>Passwort gespeichert</h1>
    <p class="muted" aria-live="polite">
        Dein Passwort wurde erfolgreich geändert. Du wirst in 2 Sekunden zur Loginseite weitergeleitet.
    </p>
    <a class="button" href="{% url 'login' %}">Jetzt zum Login</a>
</div>
{% endblock %}

{% block scripts %}
    {{ block.super }}
    <script>
        window.setTimeout(function () {
            window.location.assign("{% url 'login' %}");
        }, 2000);
    </script>
{% endblock %}
