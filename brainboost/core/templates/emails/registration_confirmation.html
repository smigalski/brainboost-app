<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>BrainBoost Bestätigung</title>
  </head>
  <body style="font-family: Arial, sans-serif; color: #0b1b2a;">
    <p>Hallo {{ user.first_name|default:user.username }},</p>
