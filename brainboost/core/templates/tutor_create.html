{% extends "base.html" %}
{% block title %}Tutor anlegen{% endblock %}
{% block content %}
<div class="card">
    <h1>Tutor anlegen</h1>
    <p class="muted">Lege einen neuen Tutor-Account an.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="button" type="submit">Speichern</button>
        <a class="button" style="background: var(--teal);" href="{% url 'dashboard' %}">Abbrechen</a>
    </form>
</div>
{% endblock %}
